<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>大九九乘法 · 逐题闯关</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0f19;
            --card-bg: rgba(22, 30, 49, 0.7);
            --card-border: rgba(255,255,255,0.08);
            --text: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #f59e0b;
            --accent-glow: rgba(245,158,11,0.25);
            --success: #10b981;
            --error: #ef4444;
            --font: 'Outfit','Noto Sans SC',sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font);
            background: var(--bg);
            background-image: radial-gradient(at 30% 20%, rgba(245,158,11,0.05),transparent 50%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text);
            padding: 16px;
        }
        .container {
            width: 100%;
            max-width: 460px;
        }

        /* ── 顶部导航 ── */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .back-link {
            color: var(--text-secondary);
            text-decoration: none;
            padding: 6px;
            border: 1px solid var(--card-border);
            border-radius: 8px;
            transition: background 0.2s,color 0.2s;
            background: var(--card-bg);
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .back-link:hover {
            color: var(--text);
            background: rgba(255,255,255,0.08);
        }
        .top-bar h1 {
            font-size: 1.15rem;
            font-weight: 800;
            letter-spacing: -0.3px;
        }

        /* ── 积分栏 ── */
        .score-bar {
            display: flex;
            gap: 6px;
            margin-bottom: 24px;
        }
        .score-item {
            flex: 1;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 10px;
            padding: 8px 6px;
            text-align: center;
        }
        .score-item .label {
            font-size: 0.65rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.4px;
            font-weight: 600;
        }
        .score-item .value {
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--accent);
            line-height: 1.3;
        }
        .score-item .value.today { color: var(--accent); }
        .score-item .value.total { color: var(--success); }
        .score-item .value.streak { color: #3b82f6; }

        /* ── 进度条 ── */
        .progress-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            font-size: 0.8rem;
            color: var(--text-secondary);
            font-weight: 600;
        }
        .progress-track {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.06);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 32px;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg,var(--accent),#f97316);
            border-radius: 10px;
            transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
            box-shadow: 0 0 10px var(--accent-glow);
        }

        /* ── 题目卡 ── */
        .question-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 48px 32px;
            text-align: center;
            backdrop-filter: blur(16px);
            margin-bottom: 24px;
        }
        .question-label {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 24px;
        }
        .question-formula {
            font-size: 3rem;
            font-weight: 800;
            color: var(--text);
            letter-spacing: 2px;
            margin-bottom: 32px;
        }
        .question-formula .op { color: var(--accent); }
        .question-formula .eq { color: var(--text-secondary); }

        /* ── 输入区 ── */
        .answer-area {
            display: flex;
            gap: 12px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
        }
        .answer-area input {
            width: 120px;
            padding: 14px 16px;
            font-size: 1.8rem;
            font-weight: 800;
            text-align: center;
            font-family: 'Outfit',monospace;
            border: 2px solid var(--card-border);
            border-radius: 14px;
            background: rgba(0,0,0,0.2);
            color: var(--text);
            transition: border-color 0.2s,box-shadow 0.2s;
            outline: none;
        }
        .answer-area input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }
        .answer-area input.correct {
            border-color: var(--success);
            box-shadow: 0 0 0 3px rgba(16,185,129,0.25);
        }
        .answer-area input.wrong {
            border-color: var(--error);
            box-shadow: 0 0 0 3px rgba(239,68,68,0.25);
            animation: shake 0.4s;
        }
        .btn-submit {
            padding: 14px 32px;
            font-size: 1.1rem;
            font-weight: 700;
            font-family: var(--font);
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg,#f59e0b,#d97706);
            color: #fff;
            cursor: pointer;
            box-shadow: 0 4px 14px var(--accent-glow);
            transition: transform 0.15s,opacity 0.2s;
        }
        .btn-submit:hover { opacity: 0.9; }
        .btn-submit:active { transform: scale(0.96); }
        .btn-submit:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        /* ── 反馈消息 ── */
        .feedback {
            text-align: center;
            min-height: 28px;
            margin-top: 16px;
            font-size: 0.9rem;
            font-weight: 600;
            transition: color 0.2s;
        }
        .feedback.correct { color: var(--success); }
        .feedback.wrong { color: var(--error); }

        /* ── 完成页面 ── */
        .complete-screen {
            display: none;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 48px 32px;
            text-align: center;
            backdrop-filter: blur(16px);
        }
        .complete-screen .big-icon { font-size: 64px; margin-bottom: 16px; }
        .complete-screen h2 { font-size: 1.6rem; font-weight: 800; margin-bottom: 8px; }
        .complete-screen p { color: var(--text-secondary); line-height: 1.6; margin-bottom: 24px; }
        .complete-screen .summary-score {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--accent);
            margin-bottom: 8px;
        }
        .complete-screen .summary-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
        .btn-restart {
            display: inline-block;
            padding: 14px 40px;
            font-size: 1.05rem;
            font-weight: 700;
            font-family: var(--font);
            border: none;
            border-radius: 14px;
            background: var(--accent);
            color: #fff;
            cursor: pointer;
            box-shadow: 0 4px 14px var(--accent-glow);
            transition: transform 0.15s,opacity 0.2s;
            text-decoration: none;
        }
        .btn-restart:hover { opacity: 0.9; }
        .btn-restart:active { transform: scale(0.96); }

        /* ── Toast ── */
        .toast {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: #1e293b;
            color: #f8fafc;
            padding: 12px 28px;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 600;
            opacity: 0;
            pointer-events: none;
            transition: transform 0.3s,opacity 0.3s;
            z-index: 9999;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.06);
        }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

        /* ── 动画 ── */
        @keyframes shake {
            0%,100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-6px); }
            80% { transform: translateX(6px); }
        }
        @keyframes fadeInUp {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .question-card { animation: fadeInUp 0.4s cubic-bezier(0.34,1.56,0.64,1); }
        .question-correct { animation: shake 0.4s; animation-direction: reverse; }

        /* ── 移动端适配 ── */
        @media (max-width: 480px) {
            .question-card { padding: 32px 20px; }
            .question-formula { font-size: 2.2rem; }
            .score-bar { gap: 4px; }
            .score-item { padding: 6px 4px; }
            .score-item .value { font-size: 1rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 顶栏 -->
        <div class="top-bar">
            <a class="back-link" href="index.html"><svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg></a>
            <h1>📐 逐题闯关</h1>
            <div style="width:60px"></div>
        </div>

        <!-- 积分栏 -->
        <div class="score-bar">
            <div class="score-item">
                <div class="label">今日积分</div>
                <div class="value today" id="quizScoreToday">0</div>
            </div>
            <div class="score-item">
                <div class="label">总积分</div>
                <div class="value total" id="quizScoreTotal">0</div>
            </div>
            <div class="score-item">
                <div class="label">连对</div>
                <div class="value streak" id="quizStreak">0</div>
            </div>
        </div>

        <!-- 进度 -->
        <div class="progress-row">
            <span id="progress-text">0 / 81</span>
            <span id="earned-text">+0 分</span>
        </div>
        <div class="progress-track">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <!-- 题目区 -->
        <div class="question-card" id="questionCard">
            <div class="question-label" id="questionLabel">第 1 题</div>
            <div class="question-formula" id="questionFormula">
                <span id="qNum1">14</span>
                <span class="op">×</span>
                <span id="qNum2">7</span>
                <span class="eq">=</span>
                <span id="qAnswer" style="display:none">?</span>
            </div>
            <div class="answer-area">
                <input type="number" id="answerInput" placeholder="?" autocomplete="off" inputmode="numeric">
                <button class="btn-submit" id="submitBtn">确 认</button>
            </div>
            <div class="feedback" id="feedback"></div>
        </div>

        <!-- 完成页 -->
        <div class="complete-screen" id="completeScreen">
            <div class="big-icon">🎉</div>
            <h2>全部完成！</h2>
            <p>你完成了全部 81 道大九九乘法题</p>
            <div class="summary-score" id="finalScore">0</div>
            <div class="summary-label">本局获得积分</div>
            <div style="margin-top:24px">
                <button class="btn-restart" onclick="restartQuiz()">🔄 再来一轮</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // ─── 积分系统 ───
        const QUIZ_SCORE = { scoreToday: 0, scoreTotal: 0, streak: 0 };
        let sessionEarned = 0;

        function getDateString() {
            const d = new Date();
            return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        }

        function saveQuizScore() {
            const todayStr = getDateString();
            let data = { scoreTotal: 0, streak: 0, dailyScores: {} };
            try {
                const raw = localStorage.getItem('math99_save');
                if (raw) { const p = JSON.parse(raw); data.dailyScores = p.dailyScores || {}; }
            } catch(e) {}
            data.scoreTotal = QUIZ_SCORE.scoreTotal;
            data.streak = QUIZ_SCORE.streak;
            data.dailyScores[todayStr] = QUIZ_SCORE.scoreToday;
            localStorage.setItem('math99_save', JSON.stringify(data));
        }

        function loadQuizScore() {
            try {
                const raw = localStorage.getItem('math99_save');
                if (raw) {
                    const data = JSON.parse(raw);
                    QUIZ_SCORE.scoreTotal = data.scoreTotal || 0;
                    QUIZ_SCORE.streak = data.streak || 0;
                    const todayStr = getDateString();
                    const daily = data.dailyScores || {};
                    QUIZ_SCORE.scoreToday = daily[todayStr] || 0;
                }
            } catch(e) {}
            updateScoreUI();
        }

        function updateScoreUI() {
            document.getElementById('quizScoreToday').textContent = QUIZ_SCORE.scoreToday;
            document.getElementById('quizScoreTotal').textContent = QUIZ_SCORE.scoreTotal;
            document.getElementById('quizStreak').textContent = QUIZ_SCORE.streak;
            document.getElementById('earned-text').textContent = '+' + sessionEarned + ' 分';
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            clearTimeout(t._tid);
            t._tid = setTimeout(() => t.classList.remove('show'), 1800);
        }

        // ─── 题目逻辑 ───
        function generateAllQuestions() {
            const all = [];
            for (let r = 11; r <= 19; r++)
                for (let c = 1; c <= 9; c++)
                    all.push({ row: r, col: c, answer: r * c });
            return all;
        }

        function shuffle(arr) {
            const a = arr.slice();
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        let questions = [];
        let currentIndex = 0;
        let isAnswered = false;

        function startQuiz() {
            questions = shuffle(generateAllQuestions());
            currentIndex = 0;
            sessionEarned = 0;
            document.getElementById('questionCard').style.display = 'block';
            document.getElementById('completeScreen').style.display = 'none';
            document.getElementById('submitBtn').disabled = false;
            loadQuestion();
        }

        function loadQuestion() {
            if (currentIndex >= questions.length) {
                showComplete();
                return;
            }
            isAnswered = false;
            const q = questions[currentIndex];
            document.getElementById('qNum1').textContent = q.row;
            document.getElementById('qNum2').textContent = q.col;
            document.getElementById('questionLabel').textContent = '第 ' + (currentIndex + 1) + ' 题';
            document.getElementById('progress-text').textContent = (currentIndex) + ' / ' + questions.length;

            const pct = (currentIndex / questions.length) * 100;
            document.getElementById('progressFill').style.width = pct + '%';

            const input = document.getElementById('answerInput');
            input.value = '';
            input.className = '';
            input.disabled = false;
            input.focus();

            document.getElementById('feedback').textContent = '';
            document.getElementById('feedback').className = 'feedback';
            document.getElementById('submitBtn').disabled = false;
            document.getElementById('submitBtn').textContent = '确 认';

            // 重新触发动画
            const card = document.getElementById('questionCard');
            card.style.animation = 'none';
            void card.offsetHeight;
            card.style.animation = 'fadeInUp 0.4s cubic-bezier(0.34,1.56,0.64,1)';

            updateScoreUI();
        }

        function checkAnswer() {
            if (isAnswered) return;
            const input = document.getElementById('answerInput');
            const userVal = parseInt(input.value, 10);
            const q = questions[currentIndex];
            const feedback = document.getElementById('feedback');

            if (isNaN(userVal)) {
                feedback.textContent = '请输入一个数字';
                feedback.className = 'feedback wrong';
                input.focus();
                return;
            }

            if (userVal === q.answer) {
                // 正确！
                isAnswered = true;
                input.className = 'correct';
                input.disabled = true;
                document.getElementById('submitBtn').disabled = true;
                const POINTS = Math.min(10, Math.max(2, Math.floor((q.row + q.col) / 2) - 4));

                // 每日积分上限 200 分
                const DAILY_MAX = 200;
                const room = Math.max(0, DAILY_MAX - QUIZ_SCORE.scoreToday);
                const actualPts = Math.min(POINTS, room);

                if (actualPts > 0) {
                    feedback.textContent = '✅ 正确！' + q.row + ' × ' + q.col + ' = ' + q.answer + ' (+' + actualPts + '分)';
                    feedback.className = 'feedback correct';
                    QUIZ_SCORE.scoreToday += actualPts;
                    QUIZ_SCORE.scoreTotal += actualPts;
                    QUIZ_SCORE.streak++;
                    sessionEarned += actualPts;
                    saveQuizScore();
                    updateScoreUI();
                    showToast('🎉 +' + actualPts + ' 分！');
                } else {
                    feedback.textContent = '✅ 正确！' + q.row + ' × ' + q.col + ' = ' + q.answer + ' (已达日上限)';
                    feedback.className = 'feedback correct';
                    QUIZ_SCORE.streak++;
                    updateScoreUI();
                    showToast('🏆 今日已达 200 分上限');
                }
                // 自动进入下一题
                setTimeout(() => {
                    currentIndex++;
                    loadQuestion();
                }, 800);
            } else {
                // 错误
                input.className = 'wrong';
                QUIZ_SCORE.streak = 0;
                updateScoreUI();
                feedback.textContent = '❌ 不对哦，再想想！';
                feedback.className = 'feedback wrong';
                input.focus();
                input.select();
                // 0.5秒后清除错误状态
                setTimeout(() => {
                    input.className = '';
                }, 500);
            }
        }

        function showComplete() {
            document.getElementById('questionCard').style.display = 'none';
            document.getElementById('completeScreen').style.display = 'block';
            document.getElementById('finalScore').textContent = '+' + sessionEarned;
            document.getElementById('progressFill').style.width = '100%';
            document.getElementById('progress-text').textContent = '81 / 81';

            showToast('🏆 全部通关！获得 +' + sessionEarned + ' 分');
        }

        function restartQuiz() {
            startQuiz();
        }

        // ─── 键盘事件 ───
        document.getElementById('answerInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                checkAnswer();
            }
        });
        document.getElementById('submitBtn').addEventListener('click', checkAnswer);

        // ─── 启动 ───
        loadQuizScore();
        startQuiz();
    </script>
</body>
</html>
